<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>《傲慢与偏见》考试词汇 Flashcards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #FAF7F2;
  --card-front: #FFFDF8;
  --card-back: #F0EDE6;
  --accent: #8B4513;
  --accent-light: #D4A574;
  --text: #2C1810;
  --text-light: #6B5B4F;
  --green: #4A7C59;
  --red: #A85454;
  --gold: #B8860B;
  --shadow: rgba(44, 24, 16, 0.12);
  --cet4: #3B82F6;
  --cet6: #8B5CF6;
  --kaoyan: #EF4444;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.app-header {
  text-align: center;
  padding: 20px 16px 12px;
  background: linear-gradient(135deg, #2C1810 0%, #5C3A28 100%);
  color: #F5E6D3;
  position: sticky; top: 0; z-index: 100;
}
.app-header h1 {
  font-family: 'Crimson Text', serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 1px;
}
.app-header .subtitle {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 2px;
}

/* Level Selector */
.level-selector {
  display: flex;
  justify-content: center;
  gap: 8px;
  background: #3A2218;
  padding: 8px 16px 10px;
}
.level-btn {
  padding: 5px 14px;
  font-size: 12px;
  color: rgba(245,230,211,0.45);
  cursor: pointer;
  border: 1.5px solid rgba(245,230,211,0.15);
  background: none;
  border-radius: 20px;
  transition: all 0.25s;
  font-family: inherit;
  font-weight: 500;
}
.level-btn.active { color: #fff; border-color: currentColor; }
.level-btn[data-level="all"].active { color: var(--gold); border-color: var(--gold); }
.level-btn[data-level="CET4"].active { color: var(--cet4); border-color: var(--cet4); }
.level-btn[data-level="CET6"].active { color: var(--cet6); border-color: var(--cet6); }
.level-btn[data-level="考研"].active { color: var(--kaoyan); border-color: var(--kaoyan); }
.level-btn:hover { color: #F5E6D3; }

/* Mode Tabs */
.mode-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  background: #3A2218;
  padding: 0 16px 10px;
}
.mode-tab {
  padding: 6px 18px;
  font-size: 13px;
  color: rgba(245,230,211,0.45);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: inherit;
}
.mode-tab.active {
  color: #F5E6D3;
  border-bottom-color: var(--gold);
}
.mode-tab:hover { color: #F5E6D3; }

/* Stats Bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 10px 16px;
  background: rgba(139,69,19,0.06);
  border-bottom: 1px solid rgba(139,69,19,0.1);
  font-size: 12px;
  color: var(--text-light);
  flex-wrap: wrap;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-dot.total { background: var(--gold); }
.stat-dot.known { background: var(--green); }
.stat-dot.unknown { background: var(--red); }
.stat-dot.cet4 { background: var(--cet4); }
.stat-dot.cet6 { background: var(--cet6); }
.stat-dot.kaoyan { background: var(--kaoyan); }

/* Progress bar */
.progress-wrap {
  height: 3px;
  background: rgba(139,69,19,0.08);
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--gold));
  transition: width 0.4s ease;
  border-radius: 0 2px 2px 0;
}

/* Main content */
#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 12px 12px 80px;
}

/* Controls */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.chip {
  padding: 4px 12px;
  font-size: 12px;
  border: 1px solid rgba(139,69,19,0.2);
  background: var(--card-front);
  color: var(--text-light);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.shuffle-btn, .reset-btn {
  padding: 4px 12px;
  font-size: 12px;
  border: 1px solid rgba(139,69,19,0.15);
  background: none;
  color: var(--text-light);
  border-radius: 16px;
  cursor: pointer;
  font-family: inherit;
}
.shuffle-btn:hover, .reset-btn:hover { background: rgba(139,69,19,0.06); }

/* Flashcard */
.card-area { text-align: center; margin-top: 6px; }
.card-counter {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.flashcard-wrapper {
  perspective: 1000px;
  cursor: pointer;
  margin: 0 auto;
  max-width: 420px;
  min-height: 260px;
}
.flashcard {
  position: relative;
  width: 100%;
  min-height: 260px;
  transition: transform 0.5s;
  transform-style: preserve-3d;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  width: 100%;
  min-height: 260px;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px 24px;
  box-shadow: 0 4px 20px var(--shadow);
}
.card-front {
  background: var(--card-front);
  border: 1px solid rgba(139,69,19,0.08);
}
.card-back {
  background: var(--card-back);
  border: 1px solid rgba(139,69,19,0.08);
  transform: rotateY(180deg);
}

.card-level-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 6px;
}
.badge-CET4 { background: var(--cet4); }
.badge-CET6 { background: var(--cet6); }
.badge-考研 { background: var(--kaoyan); }

.card-freq {
  font-size: 11px;
  color: var(--accent-light);
  margin-bottom: 6px;
}
.card-word {
  font-family: 'Crimson Text', serif;
  font-size: 42px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 6px;
}
.card-phonetic {
  font-size: 15px;
  color: var(--text-light);
  font-style: italic;
  margin-bottom: 10px;
}
.card-hint {
  font-size: 12px;
  color: var(--accent-light);
  opacity: 0.6;
  margin-top: 8px;
}
.card-definition {
  font-size: 20px;
  line-height: 1.6;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 12px;
}
.card-example {
  font-family: 'Crimson Text', serif;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-light);
  font-style: italic;
  max-width: 380px;
  text-align: left;
  background: rgba(139,69,19,0.04);
  padding: 10px 14px;
  border-radius: 8px;
  border-left: 3px solid var(--accent-light);
}
.card-example-label {
  display: block;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 10px;
  color: var(--accent-light);
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

/* Action buttons */
.action-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
}
.action-btn {
  padding: 8px 18px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-known { background: var(--green); color: #fff; }
.btn-unknown { background: var(--red); color: #fff; }
.btn-skip { background: rgba(139,69,19,0.08); color: var(--text-light); }
.action-btn:hover { opacity: 0.85; transform: scale(1.03); }

/* Nav */
.nav-row {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}
.nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(139,69,19,0.15);
  background: var(--card-front);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover { background: rgba(139,69,19,0.08); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

.keyboard-hints {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-light);
  opacity: 0.5;
}
.kbd {
  display: inline-block;
  background: rgba(139,69,19,0.08);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  margin: 0 1px;
}

/* Quiz */
.quiz-options { display: flex; flex-direction: column; gap: 8px; max-width: 420px; margin: 0 auto; }
.quiz-option {
  padding: 12px 16px;
  border: 1.5px solid rgba(139,69,19,0.12);
  border-radius: 12px;
  background: var(--card-front);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  color: var(--text);
}
.quiz-option:hover { border-color: var(--accent-light); background: rgba(139,69,19,0.03); }
.quiz-option.correct { border-color: var(--green); background: rgba(74,124,89,0.08); }
.quiz-option.correct.reveal { animation: correctPulse 0.4s ease; }
.quiz-option.wrong { border-color: var(--red); background: rgba(168,84,84,0.08); }
@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
.quiz-result {
  margin-top: 10px;
  font-size: 14px;
  font-weight: 500;
}

/* Review list */
.review-list { margin-top: 8px; }
.review-header {
  font-size: 12px;
  color: var(--text-light);
  padding: 6px 12px;
  border-bottom: 1px solid rgba(139,69,19,0.08);
}
.review-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(139,69,19,0.06);
  cursor: pointer;
  transition: background 0.15s;
}
.review-item:hover { background: rgba(139,69,19,0.03); }
.review-word {
  font-family: 'Crimson Text', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  min-width: 100px;
}
.review-def {
  font-size: 13px;
  color: var(--text-light);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.review-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  white-space: nowrap;
}
.badge-known { background: rgba(74,124,89,0.12); color: var(--green); }
.badge-unknown { background: rgba(168,84,84,0.12); color: var(--red); }
.review-level {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 6px;
  color: #fff;
  white-space: nowrap;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .msg { font-size: 15px; }

/* Responsive */
@media (max-width: 400px) {
  .card-word { font-size: 34px; }
  .card-definition { font-size: 17px; }
  .card-face { padding: 22px 18px; min-height: 240px; }
  .flashcard-wrapper, .flashcard { min-height: 240px; }
  .keyboard-hints { display: none; }
}

/* Membership / Activation */
.lock-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(44, 24, 16, 0.85);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}
.lock-modal {
  background: var(--card-front);
  border-radius: 20px;
  padding: 36px 28px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.lock-icon { font-size: 48px; margin-bottom: 12px; }
.lock-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.lock-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
  margin-bottom: 20px;
}
.lock-input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid rgba(139,69,19,0.15);
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  text-align: center;
  letter-spacing: 2px;
  outline: none;
  transition: border-color 0.2s;
}
.lock-input:focus { border-color: var(--accent); }
.lock-input.error { border-color: var(--red); animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.lock-btn {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.lock-btn-primary {
  background: linear-gradient(135deg, var(--accent), #6B3410);
  color: #fff;
}
.lock-btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
.lock-btn-secondary {
  background: none;
  color: var(--text-light);
  margin-top: 8px;
  font-size: 13px;
}
.lock-error-msg {
  color: var(--red);
  font-size: 13px;
  margin-top: 8px;
  min-height: 18px;
}
.lock-success-msg {
  color: var(--green);
  font-size: 13px;
  margin-top: 8px;
}

/* VIP badge */
.vip-badge {
  display: inline-block;
  background: linear-gradient(135deg, #B8860B, #DAA520);
  color: #fff;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
}
.free-badge {
  display: inline-block;
  background: rgba(74,124,89,0.15);
  color: var(--green);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
  margin-left: 6px;
}

/* Lock icon on level buttons */
.level-btn .lock-icon-small {
  font-size: 11px;
  margin-left: 2px;
}

/* Contact info */
.contact-info {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 12px;
  padding: 10px;
  background: rgba(139,69,19,0.04);
  border-radius: 8px;
  line-height: 1.6;
}
.contact-info a {
  color: var(--accent);
  text-decoration: none;
}

</style>
</head>
<body>

<div class="app-header">
  <h1>Pride and Prejudice · Vocabulary</h1>
  <div class="subtitle">《傲慢与偏见》考试词汇闪卡</div>
</div>

<div class="level-selector" id="levelSelector"></div>
<div class="mode-tabs" id="modeTabs"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div id="lockOverlay" class="lock-overlay" style="display:none"></div>
<div id="app"></div>

<script>

ur strictures on them!”  “Your conjecture is totally wrong, I assure you.", "l": "考研"}, {"w": "deference", "d": "n. 尊重；顺从", "f": 6, "e": "I assure you that if Darcy were not such a great tall fellow, in comparison with myself, I should not pay him half so much deference.", "l": "考研"}, {"w": "disdain", "d": "n./v. 蔑视；鄙视", "f": 6, "e": "They had not long separated when Miss Bingley came towards her, and, with an expression of civil disdain, thus accosted her,--  “So, Miss Eliza, I hear you are quite delighted with George Wickham?", "l": "考研"}, {"w": "entreat", "d": "v. 恳求；乞求", "f": 6, "e": "I entreat you not to suppose that I moved this way in order to beg for a partner.”  Mr.", "l": "考研"}, {"w": "impertinent", "d": "adj. 无礼的；不恰当的", "f": 6, "e": "I told him of all that had occurred to make my former interference in his affairs absurd and impertinent.", "l": "考研"}, {"w": "impropriety", "d": "n. 不适当；不得体", "f": 6, "e": "Darcy, and even Miss Elizabeth herself, were, I am inclined to think, rather hard on him for the “impropriety” of his conduct.", "l": "考研"}, {"w": "modesty", "d": "n. 谦虚；端庄", "f": 6, "e": "Collins began,--  “Believe me, my dear Miss Elizabeth, that your modesty, so far from doing you any disservice, rather adds to your other perfections.", "l": "考研"}, {"w": "censure", "d": "v./n. 谴责；批评", "f": 5, "e": "Darcy; the latter of whom, however, could not be prevailed on to join in their censure of _her_, in spite of all Miss Bingley’s witticisms on _fine eyes_.", "l": "考研"}, {"w": "conceit", "d": "n. 自负；幻想", "f": 5, "e": "I was given good principles, but left to follow them in pride and conceit.", "l": "考研"}, {"w": "indulge", "d": "v. 沉溺；放纵；满足", "f": 5, "e": "She saw that he wanted to engage her on the old subject of his grievances, and she was in no humour to indulge him.", "l": "考研"}, {"w": "insolent", "d": "adj. 傲慢的；无礼的", "f": 5, "e": "His coming into the country at all is a most insolent thing, indeed, and I wonder how he could presume to do it.", "l": "考研"}, {"w": "mercenary", "d": "adj. 唯利是图的 n. 雇佣兵", "f": 5, "e": "I should be sorry to think our friend mercenary.”  “Pray, my dear aunt, what is the difference in matrimonial affairs, between the mercenary and the prudent motive?", "l": "考研"}, {"w": "contrivance", "d": "n. 发明；设计；策略", "f": 4, "e": "Till the next morning, however, she was not aware of all the felicity of her contrivance.", "l": "考研"}, {"w": "decorum", "d": "n. 礼仪；端庄", "f": 4, "e": "It seems to me to show an abominable sort of conceited independence, a most country-town indifference to decorum.”  “It shows an affection for her sister that is very pleasing,” said Bingley.", "l": "考研"}, {"w": "formality", "d": "n. 礼节；正式手续", "f": 4, "e": "The formality, the under-breeding, the meanness, are there; but the portrait is only half alive, and is felt to be even a little unnatural.", "l": "考研"}, {"w": "incumbent", "d": "adj. 义不容辞的 n. 现任者", "f": 4, "e": "For about three years I heard little of him; but on the decease of the incumbent of the living which had been designed for him, he applied to me again by letter for the presentation.", "l": "考研"}, {"w": "prudence", "d": "n. 审慎；精明", "f": 4, "e": "But there was still something lurking behind, of which prudence forbade the disclosure.", "l": "考研"}, {"w": "anguish", "d": "n./v. 痛苦；苦恼", "f": 3, "e": "Be that as it may, she saw him go with regret; and in this early example of what Lydia’s infamy must produce, found additional anguish as she reflected on that wretched business.", "l": "考研"}, {"w": "banish", "d": "v. 放逐；驱逐", "f": 3, "e": "I will endeavour to banish every painful      thought, and think only of what will make me happy, your affection,      and the invariable kindness of my dear uncle and aunt.", "l": "考研"}, {"w": "candour", "d": "n. 坦率；诚实", "f": 3, "e": "Affectation of candour is common enough; one meets with it everywhere.", "l": "考研"}, {"w": "eloquence", "d": "n. 口才；雄辩", "f": 3, "e": "But little had she dared to hope that so much love and eloquence awaited ut his sisters gave it their hearty assent, and indulged their mirth for some time at the expense of their dear friend’s vulgar relations.", "l": "考研"}, {"w": "impudent", "d": "adj. 厚颜无耻的", "f": 2, "e": "Though not in the least “impudent and mannish grown,” she has no mere sensibility, no nasty niceness about her.", "l": "考研"}, {"w": "ingenious", "d": "adj. 巧妙的；有创造力的", "f": 2, "e": "But on her returning to the drawing-room, when her letter was finished, she saw, to her infinite surprise, there was reason to fear that her mother had been too ingenious for her.", "l": "考研"}, {"w": "precipitate", "d": "v. 促使 adj. 仓促的", "f": 2, "e": "...let me warn my cousin Elizabeth, and yourself, of what evils you may incur by a precipitate closure with this gentleman’s proposals, which, of course, you will be inclined...", "l": "考研"}, {"w": "pretence", "d": "n. 假装；借口", "f": 2, "e": "In town, I believe, he chiefly lived, but his studying the law was a mere pretence; and being now free from all restraint, his life was a life of idleness and dissipation.", "l": "考研"}, {"w": "propensity", "d": "n. 倾向；偏好", "f": 2, "e": "...le word--and secondly in her being entirely destitute of ill-nature for all her propensity to tease and the sharpness of her tongue....", "l": "考研"}, {"w": "rapture", "d": "n. 狂喜；欢天喜地", "f": 2, "e": "The rapture of Lydia on this occasion, her adoration of Mrs.", "l": "考研"}, {"w": "sanguine", "d": "adj. 乐观的；充满希望的", "f": 2, "e": "It was possible, however, that some of his companions in the ----shire might be able to give more information; and though she was not very sanguine in expecting it, the application was a something to look forward to.", "l": "考研"}, {"w": "satire", "d": "n. 讽刺；讽刺作品", "f": 2, "e": "But this word “cynical” is one of the most misused in the English language, especially when, by a glaring and gratuitous falsification of its original sense, it is applied, not to rough and snarling invective, but to gentle and oblique satire.", "l": "考研"}, {"w": "surmise", "d": "v./n. 推测；猜想", "f": 2, "e": "...supposed that there was much affection in the case.”  “That is not an unnatural surmise,” said Fitzwilliam; “but it is lessening the honour of my cousin’s triumph very...", "l": "考研"}, {"w": "tranquil", "d": "adj. 平静的；安宁的", "f": 2, "e": "or under what misrepresentation can you here impose upon others?”  “You take an eager interest in that gentleman’s concerns,” said Darcy, in a less tranquil tone, and with a heightened colour.", "l": "考研"}, {"w": "abound", "d": "v. 大量存在；富于", "f": 1, "e": "...I sincerely hope your Christmas in Hertfordshire may abound in the gaieties which that season generally brings, and that your beaux will be...", "l": "考研"}, {"w": "adept", "d": "adj. 熟练的 n. 能手", "f": 1, "e": "“Your friend performs delightfully,” he continued, after a pause, on seeing Bingley join the group; “and I doubt not that you are an adept in the science yourself, Mr.", "l": "考研"}, {"w": "advent", "d": "n. 出现；到来", "f": 1, "e": "All the minor passages--the loves of Jane and Bingley, the advent of Mr.", "l": "考研"}, {"w": "affable", "d": "adj. 和蔼的；友善的", "f": 1, "e": "“Yes, ma’am, that he was indeed; and his son will be just like him--just as affable to the poor.”  Elizabeth listened, wondered, doubted, and was impatient for more.", "l": "考研"}, {"w": "allude", "d": "v. 暗指；间接提到", "f": 1, "e": "Things are settled so oddly.”  “You allude, perhaps, to the entail of this estate.”  “Ah, sir, I do indeed.", "l": "考研"}, {"w": "antagonist", "d": "n. 对手；敌人", "f": 1, "e": "Bennet, he offered himself as his antagonist at backgammon.", "l": "考研"}, {"w": "apprehend", "d": "v. 逮捕；理解；忧虑", "f": 1, "e": "...umour are so subtle and delicate that they are, perhaps, at all times easier to apprehend than to express, and at any particular time likely to be differently apprehende...", "l": "考研"}, {"w": "ardent", "d": "adj. 热烈的；热心的", "f": 1, "e": "... man of so much pride excited not only astonishment but gratitude--for to love, ardent love, it must be attributed; and, as such, its impression on her was of a sort ...", "l": "考研"}, {"w": "assent", "d": "v./n. 同意；赞成", "f": 1, "e": "To this speech Bingley made no answer; but his sisters gave it their hearty assent, and indulged their mirth for some time at the expense of their dear friend’s vulgar relations.", "l": "考研"}, {"w": "augment", "d": "v. 增加；增大", "f": 1, "e": "She was confident of having performed her duty; and to fret over unavoidable evils, or augment them by anxiety, was no part of her disposition.", "l": "考研"}, {"w": "avarice", "d": "n. 贪婪；贪财", "f": 1, "e": "Where does discretion end, and avarice begin?", "l": "考研"}, {"w": "blemish", "d": "n. 瑕疵 v. 损害", "f": 1, "e": "Darcy, who never looks at any woman but to see a blemish, and who probably never looked at _you_ in his life!", "l": "考研"}, {"w": "brevity", "d": "n. 简洁；短暂", "f": 1, "e": "She answered with equal indifference and brevity, and the other said no more.", "l": "考研"}, {"w": "chagrin", "d": "n. 懊恼 v. 使懊恼", "f": 1, "e": "In her own past behaviour, there was a constant source of vexation and regret: and in the unhappy defects of her family, a subject of yet heavier chagrin.", "l": "考研"}, {"w": "cherish", "d": "v. 珍惜；怀有", "f": 1, "e": "...ature is particularly prone to it, and that there are very few of us who do not cherish a feeling of self-complacency on the score of some quality or other, real or im...", "l": "考研"}, {"w": "circumspect", "d": "adj. 谨慎的；周到的", "f": 1, "e": "We must not expect a lively young man to be always so guarded and circumspect.", "l": "考研"}, {"w": "cogent", "d": "adj. 有说服力的", "f": 1, "e": "...Pray write instantly, and let me understand it--unless it is, for very cogent reasons, to remain in the secrecy which Lydia seems to think necessary; and the...", "l": "考研"}, {"w": "condescend", "d": "v. 屈尊；俯就", "f": 1, "e": "... chiefly addressed, “there is meanness in _all_ the arts which ladies sometimes condescend to employ for captivation....", "l": "考研"}, {"w": "condolence", "d": "n. 哀悼；慰问 function saveUnlocked() {
  try {
    localStorage.setItem('pp_unlocked_v1', JSON.stringify([...unlockedLevels]));
  } catch(e) {}
}

function isLevelUnlocked(lvl) {
  if (lvl === 'all') {
    return unlockedLevels.has('CET6') && unlockedLevels.has('考研');
  }
  return unlockedLevels.has(lvl);
}

function isPremiumLevel(lvl) {
  return lvl === 'CET6' || lvl === '考研';
}

function tryActivate(code, targetLevel) {
  const upperCode = code.trim().toUpperCase();
  
  // Check ALL codes first
  if (VALID_CODES['ALL'].has(upperCode)) {
    unlockedLevels.add('CET6');
    unlockedLevels.add('考研');
    saveUnlocked();
    return { success: true, msg: '全部词汇已解锁！' };
  }
  
  // Check specific level codes
  if (targetLevel && VALID_CODES[targetLevel] && VALID_CODES[targetLevel].has(upperCode)) {
    unlockedLevels.add(targetLevel);
    saveUnlocked();
    return { success: true, msg: (targetLevel === 'CET6' ? '六级' : '考研') + '词汇已解锁！' };
  }
  
  // Check if code belongs to any level
  for (const [lvl, codes] of Object.entries(VALID_CODES)) {
    if (lvl !== 'ALL' && codes.has(upperCode)) {
      unlockedLevels.add(lvl);
      saveUnlocked();
      return { success: true, msg: (lvl === 'CET6' ? '六级' : '考研') + '词汇已解锁！' };
    }
  }
  
  return { success: false, msg: '激活码无效，请检查后重试' };
}

  const levelName = targetLevel === 'CET6' ? '六级' : targetLevel === '考研' ? '考研' : '六级+考研';

      </div>

  // Auto focus input
  setTimeout(() => {
    const input = document.getElementById('activateInput');
    if (input) {
      input.focus();
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleActivate(targetLevel);
      });
    }
  }, 100);
}

function handleActivate(targetLevel) {
  const input = document.getElementById('activateInput');
  const msgEl = document.getElementById('activateMsg');
  const code = input.value;
  
  if (!code.trim()) {
    msgEl.textContent = '请输入激活码';
    msgEl.className = 'lock-error-msg';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }
  
  const result = tryActivate(code, targetLevel);
  if (result.success) {
    msgEl.textContent = result.msg;
    msgEl.className = 'lock-success-msg';
    setTimeout(() => {
      closeLockModal();
      render();
    }, 800);
  } else {
    msgEl.textContent = result.msg;
    msgEl.className = 'lock-error-msg';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

function closeLockModal() {
  document.getElementById('lockOverlay').style.display = 'none';
  // Reset to CET4 if current level is locked
  if (!isLevelUnlocked(level)) {
    level = 'CET4';
  }
  render();
}

// Override level selection to check unlock status
const _originalLevel = level;

function getLevelData() {
  if (level === 'all') return VOCAB_DATA;
  return VOCAB_DATA.filter(item => item.l === level);
}

function getFilteredIndices() {
  const data = getLevelData();
  const globalIndices = data.map(d => VOCAB_DATA.indexOf(d));
  
  return cardOrder.filter(i => globalIndices.includes(i)).filter(i => {
    const w = VOCAB_DATA[i].w;
    if (filter === 'known') return knownWords.has(w);
    if (filter === 'unknown') return unknownWords.has(w);
    if (filter === 'remaining') return !knownWords.has(w) && !unknownWords.has(w);
    return true;
  });
}

function shuffle() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }
  currentIndex = 0;
  flipped = false;
}

function markWord(type) {
  const indices = getFilteredIndices();
  if (indices.length === 0) return;
  const word = VOCAB_DATA[indices[currentIndex]].w;
  if (type === 'known') {
    knownWords.add(word);
    unknownWords.delete(word);
  } else {
    unknownWords.add(word);
    knownWords.delete(word);
  }
  saveState();
  if (currentIndex < indices.length - 1) currentIndex++;
  flipped = false;
  render();
}

function resetProgress() {
  if (confirm('确定要重置所有学习进度吗？')) {
    knownWords.clear();
    unknownWords.clear();
    saveState();
    currentIndex = 0;
    flipped = false;
    render();
  }
}

function generateQuizOptions(correctIdx) {
  const correct = VOCAB_DATA[correctIdx];
  const levelData = getLevelData();
  const others = levelData.filter(d => d.w !== correct.w);
  const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
  const options = shuffled.map(d => ({ def: d.d, correct: false }));
  options.push({ def: correct.d, correct: true });
  return options.sort(() => Math.random() - 0.5);
}

  if (indices.length === 0) {
    html += '<div class="empty-state"><div class="icon">&#x2728;</div><div class="msg">' +
      (filter==='unknown' ? '没有待复习的词汇' : filter==='remaining' ? '所有词汇都已学习完毕！' : '当前分类没有词汇') + '</div></div>';
    return html;
  }

  if (currentIndex >= indices.length) currentIndex = indices.length - 1;
  const card = VOCAB_DATA[indices[currentIndex]];

  html += `
    <div class="card-area">
      <div class="card-counter">${currentIndex + 1} / ${indices.length}</div>
      <div class="flashcard-wrapper" onclick="flipped=!flipped;render()">
        <div class="flashcard ${flipped?'flipped':''}">
          <div class="card-face card-front">
            <span class="card-level-badge badge-${card.l}">${card.l === 'CET4' ? '四级' : card.l === 'CET6' ? '六级' : '考研'}</span>
            <div class="card-freq">在原著中出现 ${card.f} 次</div>
            <div class="card-word">${card.w}</div>
            <div class="card-hint">点击翻转查看释义 ↻</div>
          </div>
          <div class="card-face card-back">
            <span class="card-level-badge badge-${card.l}">${card.l === 'CET4' ? '四级' : card.l === 'CET6' ? '六级' : '考研'}</span>
            <div class="card-word" style="font-size:28px;margin-bottom:8px">${card.w}</div>
            <div class="card-definition">${card.d}</div>
            ${card.e ? '<div class="card-example"><span class="card-example-label">原文例句</span>' + escapeHtml(card.e) + '</div>' : ''}
          </div>
        </div>
      </div>
      <div class="action-buttons">
        <button class="action-btn btn-unknown" onclick="event.stopPropagation();markWord('unknown')">&#x274C; 不认识</button>
        <button class="action-btn btn-skip" onclick="event.stopPropagation();flipped=false;currentIndex=Math.min(currentIndex+1,${indices.length-1});render()">跳过</button>
        <button class="action-btn btn-known" onclick="event.stopPropagation();markWord('known')">&#x2705; 认识</button>
      </div>
      <div class="nav-row">
        <button class="nav-btn" ${currentIndex===0?'disabled':''} onclick="currentIndex--;flipped=false;render()">&#x25C0;</button>
        <button class="nav-btn" ${currentIndex>=indices.length-1?'disabled':''} onclick="currentIndex++;flipped=false;render()">&#x25B6;</button>
      </div>
      <div class="keyboard-hints">
        <span><span class="kbd">Space</span> 翻转</span>
        <span><span class="kbd">&#x2190;</span><span class="kbd">&#x2192;</span> 切换</span>
        <span><span class="kbd">1</span> 不认识</span>
        <span><span class="kbd">2</span> 认识</span>
      </div>
    </div>
  `;
  return html;
}

function renderQuiz() {
  const indices = getFilteredIndices();
  
  let html = `
    <div class="controls-row">
      <div class="filter-chips">
        <button class="chip ${filter==='all'?'active':''}" onclick="filter='all';currentIndex=0;quizAnswer=null;render()">全部</button>
        <button class="chip ${filter==='unknown'?'active':''}" onclick="filter='unknown';currentIndex=0;quizAnswer=null;render()">待复习</button>
        <button class="chip ${filter==='remaining'?'active':''}" onclick="filter='remaining';currentIndex=0;quizAnswer=null;render()">未学</button>
      </div>
      <button class="shuffle-btn" onclick="shuffle();quizAnswer=null;render()">&#x1f500; 随机</button>
    </div>
  `;

  if (indices.length === 0) {
    html += '<div class="empty-state"><div class="icon">&#x1f4da;</div><div class="msg">没有可测验的词汇</div></div>';
    return html;
  }

  if (currentIndex >= indices.length) currentIndex = indices.length - 1;
  const cardIdx = indices[currentIndex];
  const card = VOCAB_DATA[cardIdx];
  
  if (quizOptions.length === 0 || quizOptions._forWord !== card.w) {
    quizOptions = generateQuizOptions(cardIdx);
    quizOptions._forWord = card.w;
    quizAnswer = null;
  }

  html += `
    <div class="card-area">
      <div class="card-counter">第 ${currentIndex + 1} 题 / 共 ${indices.length} 题</div>
      <div style="text-align:center;margin-bottom:10px">
        <span class="card-level-badge badge-${card.l}">${card.l === 'CET4' ? '四级' : card.l === 'CET6' ? '六级' : '考研'}</span>
        <div class="card-freq">在原著中出现 ${card.f} 次</div>
        <div class="card-word" style="font-family:'Crimson Text',serif;font-size:38px;color:var(--accent);margin:8px 0">${card.w}</div>
      </div>
      <div style="font-size:14px;color:var(--text-light);margin-bottom:10px">选择正确的释义：</div>
      <div class="quiz-options">
  `;

  quizOptions.forEach((opt, i) => {
    let cls = 'quiz-option';
    if (quizAnswer !== null) {
      if (opt.correct) cls += ' correct reveal';
      else if (i === quizAnswer && !opt.correct) cls += ' wrong';
    }
    html += `<button class="${cls}" ${quizAnswer!==null?'disabled':''} onclick="quizAnswer=${i};${opt.correct ? "knownWords.add('" + card.w.replace(/'/g,"\\'") + "');unknownWords.delete('" + card.w.replace(/'/g,"\\'") + "')" : "unknownWords.add('" + card.w.replace(/'/g,"\\'") + "');knownWords.delete('" + card.w.replace(/'/g,"\\'") + "')"};saveState();render()">${opt.def}</button>`;
  });

  html += '</div>';
  
  if (quizAnswer !== null) {
    const isCorrect = quizOptions[quizAnswer].correct;
    html += '<div class="quiz-result" style="color:' + (isCorrect ? 'var(--green)' : 'var(--red)') + '">' + (isCorrect ? '&#x2705; 回答正确！' : '&#x274C; 回答错误，正确答案已标出') + '</div>';
    html += '<button class="action-btn btn-known" style="max-width:200px;margin-top:8px" onclick="currentIndex=Math.min(currentIndex+1,' + (indices.length-1) + ');quizAnswer=null;quizOptions=[];render()">下一题 &#x25B6;</button>';
  }

  if (card.e && quizAnswer !== null) {
    html += '<div class="card-example" style="max-width:420px;margin:14px auto 0"><span class="card-example-label">原文例句</span>' + escapeHtml(card.e) + '</div>';
  }

  html += '</div>';
  return html;
}

function renderReview() {
  const data = getLevelData();
  
  let html = `
    <div class="controls-row">
      <div class="filter-chips">
        <button class="chip ${filter==='all'?'active':''}" onclick="filter='all';render()">全部 (${data.length})</button>
        <button class="chip ${filter==='known'?'active':''}" onclick="filter='known';render()">已掌握 (${data.filter(d=>knownWords.has(d.w)).length})</button>
        <button class="chip ${filter==='unknown'?'active':''}" onclick="filter='unknown';render()">待复习 (${data.filter(d=>unknownWords.has(d.w)).length})</button>
        <button class="chip ${filter==='remaining'?'active':''}" onclick="filter='remaining';render()">未学</button>
      </div>
    </div>
    <div class="review-list">
  `;

  const items = data.filter(c => {
    if (filter === 'known') return knownWords.has(c.w);
    if (filter === 'unknown') return unknownWords.has(c.w);
    if (filter === 'remaining') return !knownWords.has(c.w) && !unknownWords.has(c.w);
    return true;
  });

  html += '<div class="review-header"><span>' + items.length + ' 个词汇</span></div>';

  items.forEach(c => {
    const status = knownWords.has(c.w) ? 'known' : unknownWords.has(c.w) ? 'unknown' : '';
    const globalIdx = VOCAB_DATA.indexOf(c);
    html += `
      <div class="review-item" onclick="mode='flashcard';filter='all';currentIndex=cardOrder.indexOf(${globalIdx});if(currentIndex<0)currentIndex=0;flipped=false;render()">
        <span class="review-level badge-${c.l}" style="background:var(--${c.l === 'CET4' ? 'cet4' : c.l === 'CET6' ? 'cet6' : 'kaoyan'})">${c.l === 'CET4' ? '四级' : c.l === 'CET6' ? '六级' : '考研'}</span>
        <span class="review-word">${c.w}</span>
        <span class="review-def">${c.d}</span>
        ${status ? '<span class="review-badge badge-' + status + '">' + (status==='known' ? '已掌握' : '待复习') + '</span>' : ''}
      </div>
    `;
  });

  html += '</div>';
  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (mode !== 'flashcard') return;
  const indices = getFilteredIndices();
  if (indices.length === 0) return;
  
  if (e.code === 'Space') { e.preventDefault(); flipped = !flipped; render(); }
  if (e.code === 'ArrowRight' && currentIndex < indices.length - 1) { currentIndex++; flipped = false; render(); }
  if (e.code === 'ArrowLeft' && currentIndex > 0) { currentIndex--; flipped = false; render(); }
  if (e.key === '1') markWord('unknown');
  if (e.key === '2') markWord('known');
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (mode !== 'flashcard') return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  const indices = getFilteredIndices();
  if (Math.abs(diff) > 60) {
    if (diff < 0 && currentIndex < indices.length - 1) { currentIndex++; flipped = false; render(); }
    if (diff > 0 && currentIndex > 0) { currentIndex--; flipped = false; render(); }
  }
});

render();
</script>
</body>
</html>
